      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;

      display: grid;

      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;

      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;

    .meta-filter-button:hover {

      background: var(--chip);
      color: var(--main-dark);

    .intro-hidden-filter-button {
      display: inline;
      border: none;
      padding: 0;
      background: transparent;
      color: inherit;

      align-items: end;

    .answer-input {

      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }

    .answer-input:focus {

    .answer-button {
      background: var(--main);

      min-width: 96px;
    }

    .answer-message {

      font-weight: 800;

      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .field {
      min-width: 0;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .option-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .option {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option span {
      display: inline-block;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      transition: 0.16s ease;
      white-space: nowrap;

    .option input:checked + span {
      border-color: var(--main);
      background: var(--chip);
      color: var(--main-dark);
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
      font-family: inherit;

    button:hover {
      transform: translateY(-1px);

    button:active {
      transform: translateY(0);

      color: #fff;
      min-width: 96px;

    .reset-button {

      color: var(--main-dark);
      min-width: 96px;

    .result-area {
      padding: 20px;

      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;

      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;

    .result-title {

      font-size: 18px;
      font-weight: 800;
    }

    .result-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;

      border-radius: 12px;
      background: #f8eef3;
      color: var(--main-dark);
      font-size: 13px;
      line-height: 1.6;

      gap: 12px;

      border-radius: 16px;
      background: #fff;
      padding: 16px;

      font-size: 18px;
      line-height: 1.45;

      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;

      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      background: var(--chip);
      color: var(--main-dark);
    }

    .favorite-badge {

      border-radius: 999px;
      background: var(--favorite-bg);
      color: var(--favorite-text);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .favorite-badge.is-active {
      box-shadow: 0 0 0 3px rgba(230, 200, 79, 0.25);
    }

    .article-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .article-body {
      flex: 1;
      min-width: 0;
      margin: 0;
      color: #514b51;
      line-height: 1.7;
      font-size: 14px;

    .empty {

      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
    }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(47, 41, 48, 0.42);
      backdrop-filter: blur(4px);

    .intro-overlay.is-hidden {
      display: none;

      border: 1px solid var(--line);
      border-radius: 24px;
      background:

      box-shadow: 0 22px 60px rgba(47, 41, 48, 0.24);

    .intro-close {
      position: absolute;
      top: 12px;
      right: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      background: #f0e8ec;
      color: var(--main-dark);
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }

    .intro-title {
      margin: 0 0 16px;
      padding-right: 36px;
      color: var(--text);
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.35;
      letter-spacing: 0.03em;
    }

    .intro-text {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 2;
      font-weight: 600;
    }

    .intro-start {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

      .search-grid {

        gap: 12px;
      }

      .search-panel,
      .result-area {
        padding: 14px;
        border-radius: 16px;

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .search-button,

        width: 100%;
        min-width: 0;
      }

      .answer-form {
        grid-template-columns: 1fr;
      }

      .answer-button {
        width: 100%;

      .result-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .result-count {

      .article {

      .article-main {

        font-size: 14px;
        line-height: 1.9;

    const state = {
      articles: [],
      filteredArticles: [],
      dataSource: "",
      statusFilter: "",
      favoriteFilter: "",
      pendingTagFilter: ""
    };

    const searchForm = document.getElementById("searchForm");
    const resetButton = document.getElementById("resetButton");
    const articleList = document.getElementById("articleList");
    const resultCount = document.getElementById("resultCount");
    const dataSourceMessage = document.getElementById("dataSourceMessage");
    const publicMetaButton = document.getElementById("publicMetaButton");
    const nazoMetaButton = document.getElementById("nazoMetaButton");
    const activeFilters = document.getElementById("activeFilters");
    const introOverlay = document.getElementById("introOverlay");
    const introCloseButton = document.getElementById("introCloseButton");
    const introFavoriteButton = document.getElementById("introFavoriteButton");
    const answerForm = document.getElementById("answerForm");
    const answerInput = document.getElementById("answerInput");
    const answerMessage = document.getElementById("answerMessage");

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      setupPageMode();
      setupIntroModal();
      setupAnswerForm();
      setupToggleableRadios();
      setupPublicMetaFilter();
      setupNazoMetaSelector();
      setupIntroFavoriteFilter();

      const loaded = await loadArticles();

      state.articles = loaded.articles;
      state.dataSource = loaded.source;

      renderDataSourceMessage();
      applySearch();

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        applySearch();
      });

      resetButton.addEventListener("click", () => {
        searchForm.reset();
        document.querySelector('input[name="dateOrder"][value="old"]').checked = true;
        document.querySelector('input[name="limit"][value="5"]').checked = true;
        state.statusFilter = "";
        state.favoriteFilter = "";
        state.pendingTagFilter = "";
        publicMetaButton.classList.remove("is-active");
        nazoMetaButton.classList.remove("is-active");
        introFavoriteButton.classList.remove("is-active");
        applySearch();
      });
    }

    function setupPageMode() {
      const params = new URLSearchParams(window.location.search);
      const add = params.get("add");

      document.body.classList.toggle("mode-form", add === "form");
      document.body.classList.toggle("mode-frame", add === "frame" || !add);
    }

    function setupAnswerForm() {
      if (!answerForm) return;

      answerForm.addEventListener("submit", (event) => {
        event.preventDefault();
        answerMessage.textContent = "解答を受け付けました。";
        answerInput.blur();
      });
    }

    function setupIntroModal() {
      introCloseButton.addEventListener("click", () => {
        introOverlay.classList.add("is-hidden");
      });
    }

    function setupToggleableRadios() {
      const radios = document.querySelectorAll('input[type="radio"]');

      radios.forEach((radio) => {
        radio.addEventListener("pointerdown", () => {
          radio.dataset.wasChecked = radio.checked ? "true" : "false";
        });

        radio.addEventListener("click", () => {
          if (radio.dataset.wasChecked === "true") {
            radio.checked = false;
            radio.dataset.wasChecked = "false";
          }

          if (radio.name === "tag") {
            if (radio.checked) {
              state.pendingTagFilter = radio.value;
              nazoMetaButton.classList.remove("is-active");
            } else {
              state.pendingTagFilter = "";
            }
          }
        });
      });
    }

    function setupPublicMetaFilter() {
      publicMetaButton.addEventListener("click", () => {
        if (state.statusFilter === "公開") {
          state.statusFilter = "";
          publicMetaButton.classList.remove("is-active");
        } else {
          state.statusFilter = "公開";
          publicMetaButton.classList.add("is-active");
        }

        applySearch();
      });
    }

    function setupNazoMetaSelector() {
      nazoMetaButton.addEventListener("click", () => {
        const tagRadios = document.querySelectorAll('input[name="tag"]');

        if (state.pendingTagFilter === "謎解き") {
          state.pendingTagFilter = "";
          nazoMetaButton.classList.remove("is-active");
        } else {
          state.pendingTagFilter = "謎解き";
          nazoMetaButton.classList.add("is-active");
          tagRadios.forEach((radio) => {
            radio.checked = false;
            radio.dataset.wasChecked = "false";
          });
        }
      });
    }

    function setupIntroFavoriteFilter() {
      introFavoriteButton.addEventListener("click", () => {
        if (state.favoriteFilter === "お気に入り") {
          state.favoriteFilter = "";
          introFavoriteButton.classList.remove("is-active");
        } else {
          state.favoriteFilter = "お気に入り";
          state.statusFilter = "";
          state.pendingTagFilter = "";

          introFavoriteButton.classList.add("is-active");
          publicMetaButton.classList.remove("is-active");
          nazoMetaButton.classList.remove("is-active");

          document.querySelectorAll('input[name="tag"]').forEach((radio) => {
            radio.checked = false;
            radio.dataset.wasChecked = "false";
          });
        }

        applySearch();
      });
    }

    async function loadArticles() {
      try {
        const response = await fetch(DATA_URL, { cache: "no-store" });

        if (!response.ok) {
          throw new Error("data.tsvの読み込みに失敗しました。");
        }

        const text = await response.text();

        return {
          articles: parseTsv(text),
          source: "external"
        };
      } catch (error) {
        console.warn("data.tsvを読み込めなかったため、内蔵サンプルデータを使用します。", error);

        return {
          articles: parseTsv(FALLBACK_TSV),
          source: "fallback"
        };
      }
    }

    function parseTsv(tsvText) {
      const lines = tsvText
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n")
        .filter((line) => line.trim() !== "");

      if (lines.length <= 1) {
        return [];
      }

      const headers = lines[0].split("\t").map((header) => header.trim());

      return lines.slice(1).map((line) => {
        const values = line.split("\t");

        const article = {};
        headers.forEach((header, index) => {
          article[header] = values[index] ? values[index].trim() : "";
        });

        return article;
      });
    }

    function renderDataSourceMessage() {
      if (state.dataSource === "external") {
        dataSourceMessage.textContent = "data.tsvを読み込んで表示しています。";
        return;
      }

      dataSourceMessage.textContent = "ローカル確認用の内蔵サンプルデータを表示しています。GitHub Pagesなどではdata.tsvを読み込みます。";
    }

    function applySearch() {
      const selectedDateOrder = getSelectedValue("dateOrder") || "old";
      const limit = Number(getSelectedValue("limit") || 5);

      let results = [...state.articles];

      if (state.pendingTagFilter) {
        results = results.filter((article) => article["タグ"] === state.pendingTagFilter);
      }

      if (state.statusFilter) {
        results = results.filter((article) => article["ステータス"] === state.statusFilter);
      }

      if (state.favoriteFilter) {
        results = results.filter((article) => article["ステータス2"] === state.favoriteFilter);
      }

      const canShowFavoriteNormally =
        state.favoriteFilter === "お気に入り" ||
        (state.pendingTagFilter === "謎解き" && state.statusFilter === "公開");

      if (!canShowFavoriteNormally) {
        results = results.filter((article) => article["ステータス2"] !== "お気に入り");
      }

      results.sort((a, b) => {
        const dateA = new Date(a["日付"]);
        const dateB = new Date(b["日付"]);

        if (selectedDateOrder === "new") {
          return dateB - dateA;
        }

        return dateA - dateB;
      });

      state.filteredArticles = results;

      syncFavoriteFilterButtons();
      renderActiveFilters();
      renderArticles(results.slice(0, limit), results.length, limit);
    }

    function getSelectedValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    function syncFavoriteFilterButtons() {
      if (state.favoriteFilter === "お気に入り") {
        introFavoriteButton.classList.add("is-active");
      } else {
        introFavoriteButton.classList.remove("is-active");
      }
    }

    function renderActiveFilters() {
      activeFilters.innerHTML = "";

      if (state.favoriteFilter === "お気に入り") {
        const chip = document.createElement("span");
        chip.className = "active-filter-chip";
        chip.textContent = "お気に入り";

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "active-filter-remove";
        removeButton.textContent = "×";
        removeButton.addEventListener("click", () => {
          state.favoriteFilter = "";
          applySearch();
        });

        chip.appendChild(removeButton);
        activeFilters.appendChild(chip);
      }
    }

    function activateFavoriteFilter() {
      if (state.favoriteFilter === "お気に入り") {
        state.favoriteFilter = "";
      } else {
        state.favoriteFilter = "お気に入り";
        state.statusFilter = "";
        state.pendingTagFilter = "";

        publicMetaButton.classList.remove("is-active");
        nazoMetaButton.classList.remove("is-active");

        document.querySelectorAll('input[name="tag"]').forEach((radio) => {
          radio.checked = false;
          radio.dataset.wasChecked = "false";
        });
      }

      applySearch();
    }

    function renderArticles(articles, totalCount, limit) {
      articleList.innerHTML = "";

      resultCount.textContent = `${totalCount}件中 ${Math.min(totalCount, limit)}件を表示`;

      if (articles.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "条件に合う記事は見つかりませんでした。";
        articleList.appendChild(empty);
        return;
      }

      articles.forEach((article) => {
        const item = document.createElement("article");
        const isFavorite = article["ステータス2"] === "お気に入り";
        item.className = isFavorite ? "article is-favorite" : "article";

        const title = document.createElement("h3");
        title.className = "article-title";
        title.textContent = article["記事タイトル"];

        const meta = document.createElement("div");
        meta.className = "article-meta";

        const date = document.createElement("span");
        date.textContent = article["日付"];

        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = article["タグ"];

        meta.appendChild(date);
        meta.appendChild(tag);

        if (isFavorite) {
          const favoriteBadge = document.createElement("button");
          favoriteBadge.type = "button";
          favoriteBadge.className = state.favoriteFilter === "お気に入り" ? "favorite-badge is-active" : "favorite-badge";
          favoriteBadge.textContent = "お気に入り";
          favoriteBadge.addEventListener("click", activateFavoriteFilter);

          meta.appendChild(favoriteBadge);
        }

        const main = document.createElement("div");
        main.className = "article-main";

        const body = document.createElement("p");
        body.className = "article-body";
        body.textContent = makeExcerpt(article["本文"], 20);

        main.appendChild(body);

        item.appendChild(title);
        item.appendChild(meta);
        item.appendChild(main);

        articleList.appendChild(item);
      });
    }

    function makeExcerpt(text, maxLength) {
      if (!text) return "";

      const normalized = text.trim();

      if (normalized.length <= maxLength) {
        return normalized;
      }

      return normalized.slice(0, maxLength) + "…";
    }
  </script>
