<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>片翼【mmの謎解き#9】</title>
  <style>
    :root {
      --bg: #f7f3f5;
      --text: #2f2930;
      --muted: #777077;
      --main: #c76f93;
      --main-dark: #9f4f71;
      --line: #e4d8df;
      --chip: #f2dce7;
      --favorite-bg: #fff1a8;
      --favorite-line: #e6c84f;
      --favorite-text: #6f5600;
      --shadow: 0 10px 30px rgba(70, 40, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(199, 111, 147, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(159, 79, 113, 0.12), transparent 34%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 56px;
    }

    header {
      margin-bottom: 18px;
    }

    .title-area {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 8px;
    }

    .site-label {
      display: inline-block;
      padding: 6px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--main-dark);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
    }

    .hidden-filter-button {
      border: none;
      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
    }

    .hidden-filter-button:hover {
      transform: none;
      opacity: 1;
    }

    .hidden-filter-button.is-active {
      padding: 6px 14px;
      border: 1px solid var(--main);
      border-radius: 999px;
      background: var(--chip);
      color: var(--main-dark);
      font-weight: 700;
    }

    .site-label .hidden-filter-button.is-active {
      margin: -6px -14px;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5.4vw, 48px);
      line-height: 1.1;
      letter-spacing: 0.04em;
    }

    .meta-info {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .meta-filter-button {
      display: inline;
      border: none;
      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
    }

    .meta-filter-button:hover {
      transform: none;
      opacity: 1;
    }

    .meta-filter-button.is-active {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--main);
      border-radius: 999px;
      background: var(--chip);
      color: var(--main-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .intro-hidden-filter-button {
      display: inline;
      border: none;
      padding: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      text-decoration: none;
      cursor: pointer;
      border-radius: 0;
    }

    .intro-hidden-filter-button:hover {
      transform: none;
      opacity: 1;
    }

    .intro-hidden-filter-button.is-active {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid var(--favorite-line);
      border-radius: 999px;
      background: var(--favorite-bg);
      color: var(--favorite-text);
      font-weight: 800;
      text-decoration: none;
    }

    .lead {
      margin: 20px 0 12px;
      color: var(--text);
      line-height: 1.8;
      font-size: 15px;
      font-weight: 700;
    }

    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .answer-panel {
      display: none;
      padding: 18px;
      margin-bottom: 18px;
    }

    body.mode-form .answer-panel {
      display: block;
    }

    .answer-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    .answer-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-weight: 700;
    }

    .answer-input:focus {
      outline: 3px solid rgba(199, 111, 147, 0.18);
    }

    .answer-button {
      background: var(--main);
      color: #fff;
      min-width: 96px;
    }

    .answer-message {
      min-height: 1.6em;
      margin: 10px 0 0;
      color: var(--main-dark);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.6;
    }

    body.mode-form * {
      border: none !important;
    }

    .search-panel {
      padding: 18px;
      margin-bottom: 18px;
    }

    .search-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .field {
      min-width: 0;
    }

    .field-label {
      display: block;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
      font-weight: 800;
    }

    .option-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .option {
      position: relative;
      display: inline-flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .option input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .option span {
      display: inline-block;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      transition: 0.16s ease;
      white-space: nowrap;
    }

    .option input:checked + span {
      border-color: var(--main);
      background: var(--chip);
      color: var(--main-dark);
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
      font-family: inherit;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
      opacity: 0.86;
    }

    .search-button {
      background: var(--main);
      color: #fff;
      min-width: 96px;
    }

    .reset-button {
      background: #f0e8ec;
      color: var(--main-dark);
      min-width: 96px;
    }

    .result-area {
      padding: 20px;
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 14px;
    }

    .result-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .result-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    .result-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .active-filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 4px 9px;
      border: 1px solid var(--favorite-line);
      border-radius: 999px;
      background: var(--favorite-bg);
      color: var(--favorite-text);
      font-size: 12px;
      font-weight: 800;
    }

    .active-filter-remove {
      border: none;
      background: transparent;
      color: inherit;
      padding: 0;
      border-radius: 0;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }

    .active-filter-remove:hover {
      transform: none;
      opacity: 0.7;
    }

    .data-source {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f8eef3;
      color: var(--main-dark);
      font-size: 13px;
      line-height: 1.6;
    }

    .article-list {
      display: grid;
      gap: 12px;
    }

    .article {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #fff;
      padding: 16px;
    }

    .article.is-favorite {
      border-color: var(--favorite-line);
      background: linear-gradient(90deg, rgba(255, 241, 168, 0.55), #fff 42%);
      box-shadow: 0 8px 22px rgba(111, 86, 0, 0.08);
    }

    .article-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.45;
    }

    .article-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
      background: var(--chip);
      color: var(--main-dark);
    }

    .favorite-badge {
      display: inline-block;
      padding: 2px 9px;
      border: 1px solid var(--favorite-line);
      border-radius: 999px;
      background: var(--favorite-bg);
      color: var(--favorite-text);
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .favorite-badge.is-active {
      box-shadow: 0 0 0 3px rgba(230, 200, 79, 0.25);
    }

    .article-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .article-body {
      flex: 1;
      min-width: 0;
      margin: 0;
      color: #514b51;
      line-height: 1.7;
      font-size: 14px;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.7);
    }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(47, 41, 48, 0.42);
      backdrop-filter: blur(4px);
    }

    .intro-overlay.is-hidden {
      display: none;
    }

    .intro-modal {
      position: relative;
      width: min(660px, 100%);
      padding: 34px 32px 28px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(199, 111, 147, 0.14), transparent 35%),
        #fff;
      box-shadow: 0 22px 60px rgba(47, 41, 48, 0.24);
    }

    .intro-close {
      position: absolute;
      top: 12px;
      right: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      background: #f0e8ec;
      color: var(--main-dark);
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }

    .intro-title {
      margin: 0 0 16px;
      padding-right: 36px;
      color: var(--text);
      font-size: clamp(22px, 5vw, 30px);
      line-height: 1.35;
      letter-spacing: 0.03em;
    }

    .intro-text {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 2;
      font-weight: 600;
    }

    .intro-start {
      margin-top: 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }


    .clear-overlay {
      position: fixed;
      inset: 0;
      z-index: 1200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(47, 41, 48, 0.42);
      backdrop-filter: blur(4px);
    }

    .clear-overlay.is-hidden {
      display: none;
    }

    .clear-modal {
      position: relative;
      width: min(460px, 100%);
      padding: 36px 30px 30px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        radial-gradient(circle at top left, rgba(199, 111, 147, 0.18), transparent 38%),
        #fff;
      box-shadow: 0 22px 60px rgba(47, 41, 48, 0.24);
      text-align: center;
    }

    .clear-close {
      position: absolute;
      top: 12px;
      right: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      padding: 0;
      border-radius: 999px;
      background: #f0e8ec;
      color: var(--main-dark);
      font-size: 20px;
      line-height: 1;
      font-weight: 900;
    }

    .clear-title {
      margin: 0 0 10px;
      color: var(--main-dark);
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1.1;
      letter-spacing: 0.05em;
    }

    .clear-subtitle {
      margin: 0 0 22px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      line-height: 1.5;
    }

    .post-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
      padding: 13px 18px;
      border-radius: 14px;
      background: var(--main);
      color: #fff;
      font-weight: 900;
      text-decoration: none;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .post-button:hover {
      transform: translateY(-1px);
    }

    .post-button:active {
      transform: translateY(0);
      opacity: 0.86;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    @media (max-width: 820px) {
      .search-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .search-panel,
      .result-area {
        padding: 14px;
        border-radius: 16px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .search-button,
      .reset-button {
        width: 100%;
        min-width: 0;
      }

      .answer-form {
        grid-template-columns: 1fr;
      }

      .answer-button {
        width: 100%;
      }

      .result-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .result-count {
        white-space: normal;
      }

      .article {
        padding: 13px;
      }

      .article-title {
        font-size: 16px;
      }

      .article-main {
        align-items: center;
        gap: 8px;
      }

      .article-body {
        font-size: 13px;
        line-height: 1.6;
      }

      .intro-modal {
        padding: 28px 22px 22px;
        border-radius: 18px;
      }

      .intro-text {
        font-size: 14px;
        line-height: 1.9;
      }
    }
  </style>
</head>
<body>
  <div class="intro-overlay" id="introOverlay">
    <section class="intro-modal" role="dialog" aria-modal="true" aria-labelledby="introTitle">
      <button type="button" class="intro-close" id="introCloseButton" aria-label="閉じる">×</button>
      <h2 class="intro-title" id="introTitle">片翼【mmの謎解き#9】</h2>
      <p class="intro-text">
        この謎解きの成功条件は、<br>
        クリアページに到達することです。<br>
        ソースコードの閲覧は禁止です。<br>
        この謎解きが、あなたの<button type="button" class="intro-hidden-filter-button" id="introFavoriteButton">お気に入り</button>の謎解きになることを願っております。
      </p>
      <p class="intro-start">右上の×を押して、始めましょう。</p>
    </section>
  </div>

  <div class="clear-overlay is-hidden" id="clearOverlay">
    <section class="clear-modal" role="dialog" aria-modal="true" aria-labelledby="clearTitle">
      <button type="button" class="clear-close" id="clearCloseButton" aria-label="閉じる">×</button>
      <h2 class="clear-title" id="clearTitle">CLEAR！</h2>
      <p class="clear-subtitle">片翼【mmの謎解き#9】</p>
      <a class="post-button" id="postButton" href="#" target="_blank" rel="noopener noreferrer">POST</a>
    </section>
  </div>

  <main class="page">
    <header>
      <div class="title-area">
        <div class="site-label">
          <button type="button" class="hidden-filter-button" id="nazoMetaButton">謎解き</button>
        </div>
        <h1>片翼【mmの謎解き#9】</h1>
        <div class="meta-info">
          <div>想定クリア時間：90min</div>
          <div>
            <button type="button" class="meta-filter-button" id="publicMetaButton">公開</button>：2026年6月17日
          </div>
          <div>制作：mm（@mm_syumida）#mmの謎解き</div>
        </div>
      </div>
    </header>

    <p class="lead">記事を検索して、クリアページに到達しよう！</p>

    <section class="card answer-panel" id="answerPanel">
      <div class="search-header">
        <h2 class="panel-title">解答フォーム</h2>
      </div>

      <form class="answer-form" id="answerForm">
        <div class="field">
          <label class="field-label" for="answerInput">解答</label>
          <input class="answer-input" id="answerInput" type="text" autocomplete="off" placeholder="解答をひらがなで入力" />
        </div>
        <button class="answer-button" type="submit">送信</button>
      </form>
      <p class="answer-message" id="answerMessage" aria-live="polite"></p>
    </section>

    <section class="card search-panel">
      <div class="search-header">
        <h2 class="panel-title">記事を検索</h2>
      </div>

      <form id="searchForm">
        <div class="search-grid">
          <div class="field">
            <span class="field-label">タグ</span>
            <div class="option-list">
              <label class="option">
                <input type="radio" name="tag" value="仕事" />
                <span>仕事</span>
              </label>
              <label class="option">
                <input type="radio" name="tag" value="恋愛" />
                <span>恋愛</span>
              </label>
              <label class="option">
                <input type="radio" name="tag" value="ゲーム" />
                <span>ゲーム</span>
              </label>
              <label class="option">
                <input type="radio" name="tag" value="ほか" />
                <span>ほか</span>
              </label>
            </div>
          </div>

          <div class="field">
            <span class="field-label">日付</span>
            <div class="option-list">
              <label class="option">
                <input type="radio" name="dateOrder" value="old" checked />
                <span>古い順</span>
              </label>
              <label class="option">
                <input type="radio" name="dateOrder" value="new" />
                <span>新しい順</span>
              </label>
            </div>
          </div>

          <div class="field">
            <span class="field-label">表示件数</span>
            <div class="option-list">
              <label class="option">
                <input type="radio" name="limit" value="5" checked />
                <span>5件</span>
              </label>
              <label class="option">
                <input type="radio" name="limit" value="10" />
                <span>10件</span>
              </label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="search-button" type="submit">検索</button>
          <button class="reset-button" type="button" id="resetButton">リセット</button>
        </div>
      </form>
    </section>

    <section class="card result-area">
      <div class="result-head">
        <div class="result-left">
          <h2 class="result-title">検索結果</h2>
          <div class="active-filters" id="activeFilters"></div>
        </div>
        <div class="result-count" id="resultCount">読み込み中...</div>
      </div>


      <div id="articleList" class="article-list"></div>
    </section>

    <footer>
      このブログ・記事はすべて架空のものです。
    </footer>
  </main>

  <script>
    const DATA_URL = "./data.tsv";
    const CORRECT_ANSWER = "めいりょう";
    const POST_TEXT = `片翼をクリアしました！
#mmの謎解き #片翼_mm謎
https://mm-rooftop99.github.io/mmnazo09_katayoku/`;

    const state = {
      articles: [],
      filteredArticles: [],
      statusFilter: "",
      favoriteFilter: "",
      pendingTagFilter: ""
    };

    const searchForm = document.getElementById("searchForm");
    const resetButton = document.getElementById("resetButton");
    const articleList = document.getElementById("articleList");
    const resultCount = document.getElementById("resultCount");
    const publicMetaButton = document.getElementById("publicMetaButton");
    const nazoMetaButton = document.getElementById("nazoMetaButton");
    const activeFilters = document.getElementById("activeFilters");
    const introOverlay = document.getElementById("introOverlay");
    const introCloseButton = document.getElementById("introCloseButton");
    const introFavoriteButton = document.getElementById("introFavoriteButton");
    const answerForm = document.getElementById("answerForm");
    const answerInput = document.getElementById("answerInput");
    const answerMessage = document.getElementById("answerMessage");
    const clearOverlay = document.getElementById("clearOverlay");
    const clearCloseButton = document.getElementById("clearCloseButton");
    const postButton = document.getElementById("postButton");

    document.addEventListener("DOMContentLoaded", init);

    async function init() {
      if (!setupPageMode()) return;
      setupIntroModal();
      setupAnswerForm();
      setupToggleableRadios();
      setupPublicMetaFilter();
      setupNazoMetaSelector();
      setupIntroFavoriteFilter();

      try {
        state.articles = await loadArticles();
        applySearch();
      } catch (error) {
        console.error(error);
        state.articles = [];
        resultCount.textContent = "0件中 0件を表示";
        articleList.innerHTML = "";
      }

      searchForm.addEventListener("submit", (event) => {
        event.preventDefault();
        applySearch();
      });

      resetButton.addEventListener("click", () => {
        searchForm.reset();
        document.querySelector('input[name="dateOrder"][value="old"]').checked = true;
        document.querySelector('input[name="limit"][value="5"]').checked = true;
        state.statusFilter = "";
        state.favoriteFilter = "";
        state.pendingTagFilter = "";
        publicMetaButton.classList.remove("is-active");
        nazoMetaButton.classList.remove("is-active");
        introFavoriteButton.classList.remove("is-active");
        applySearch();
      });
    }

    function setupPageMode() {
      const params = new URLSearchParams(window.location.search);

      if (!params.has("add")) {
        params.set("add", "frame");
        const nextUrl = `${window.location.pathname}?${params.toString()}${window.location.hash}`;
        window.location.replace(nextUrl);
        return false;
      }

      const add = params.get("add");

      document.body.classList.toggle("mode-form", add === "form");
      document.body.classList.toggle("mode-frame", add !== "form");
      return true;
    }

    function setupAnswerForm() {
      if (!answerForm) return;

      postButton.href = `https://twitter.com/intent/tweet?text=${encodeURIComponent(POST_TEXT)}`;

      clearCloseButton.addEventListener("click", () => {
        clearOverlay.classList.add("is-hidden");
      });

      answerForm.addEventListener("submit", (event) => {
        event.preventDefault();

        const answer = normalizeAnswer(answerInput.value);

        if (answer === CORRECT_ANSWER) {
          answerMessage.textContent = "";
          answerInput.blur();
          clearOverlay.classList.remove("is-hidden");
          return;
        }

        answerMessage.textContent = "不正解です。";
      });
    }

    function normalizeAnswer(value) {
      return value
        .trim()
        .replace(/[ァ-ン]/g, (char) => String.fromCharCode(char.charCodeAt(0) - 0x60))
        .replace(/[ぁ-ん]/g, (char) => char)
        .replace(/\s+/g, "");
    }

    function setupIntroModal() {
      introCloseButton.addEventListener("click", () => {
        introOverlay.classList.add("is-hidden");
      });
    }

    function setupToggleableRadios() {
      const radios = document.querySelectorAll('input[type="radio"]');

      radios.forEach((radio) => {
        radio.addEventListener("pointerdown", () => {
          radio.dataset.wasChecked = radio.checked ? "true" : "false";
        });

        radio.addEventListener("click", () => {
          if (radio.dataset.wasChecked === "true") {
            radio.checked = false;
            radio.dataset.wasChecked = "false";
          }

          if (radio.name === "tag") {
            if (radio.checked) {
              state.pendingTagFilter = radio.value;
              nazoMetaButton.classList.remove("is-active");
            } else {
              state.pendingTagFilter = "";
            }
          }
        });
      });
    }

    function setupPublicMetaFilter() {
      publicMetaButton.addEventListener("click", () => {
        if (state.statusFilter === "公開") {
          state.statusFilter = "";
          publicMetaButton.classList.remove("is-active");
        } else {
          state.statusFilter = "公開";
          publicMetaButton.classList.add("is-active");
        }

        applySearch();
      });
    }

    function setupNazoMetaSelector() {
      nazoMetaButton.addEventListener("click", () => {
        const tagRadios = document.querySelectorAll('input[name="tag"]');

        if (state.pendingTagFilter === "謎解き") {
          state.pendingTagFilter = "";
          nazoMetaButton.classList.remove("is-active");
        } else {
          state.pendingTagFilter = "謎解き";
          nazoMetaButton.classList.add("is-active");
          tagRadios.forEach((radio) => {
            radio.checked = false;
            radio.dataset.wasChecked = "false";
          });
        }
      });
    }

    function setupIntroFavoriteFilter() {
      introFavoriteButton.addEventListener("click", () => {
        if (state.favoriteFilter === "お気に入り") {
          state.favoriteFilter = "";
          introFavoriteButton.classList.remove("is-active");
        } else {
          state.favoriteFilter = "お気に入り";
          state.statusFilter = "";
          state.pendingTagFilter = "";

          introFavoriteButton.classList.add("is-active");
          publicMetaButton.classList.remove("is-active");
          nazoMetaButton.classList.remove("is-active");

          document.querySelectorAll('input[name="tag"]').forEach((radio) => {
            radio.checked = false;
            radio.dataset.wasChecked = "false";
          });
        }

        applySearch();
      });
    }

    async function loadArticles() {
      const response = await fetch(DATA_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("data.tsvの読み込みに失敗しました。");
      }

      const text = await response.text();
      return parseTsv(text);
    }

    function parseTsv(tsvText) {
      const lines = tsvText
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n")
        .filter((line) => line.trim() !== "");

      if (lines.length <= 1) {
        return [];
      }

      const headers = lines[0].split("\t").map((header) => header.trim());

      return lines.slice(1).map((line) => {
        const values = line.split("\t");

        const article = {};
        headers.forEach((header, index) => {
          article[header] = values[index] ? values[index].trim() : "";
        });

        return article;
      });
    }

    function applySearch() {
      const selectedDateOrder = getSelectedValue("dateOrder") || "old";
      const limit = Number(getSelectedValue("limit") || 5);

      let results = [...state.articles];

      if (state.pendingTagFilter) {
        results = results.filter((article) => article["タグ"] === state.pendingTagFilter);
      }

      if (state.statusFilter) {
        results = results.filter((article) => article["ステータス"] === state.statusFilter);
      }

      if (state.favoriteFilter) {
        results = results.filter((article) => article["ステータス2"] === state.favoriteFilter);
      }

      const canShowFavoriteNormally =
        state.favoriteFilter === "お気に入り" ||
        (state.pendingTagFilter === "謎解き" && state.statusFilter === "公開");

      if (!canShowFavoriteNormally) {
        results = results.filter((article) => article["ステータス2"] !== "お気に入り");
      }

      results.sort((a, b) => {
        const dateA = new Date(a["日付"]);
        const dateB = new Date(b["日付"]);

        if (selectedDateOrder === "new") {
          return dateB - dateA;
        }

        return dateA - dateB;
      });

      state.filteredArticles = results;

      syncFavoriteFilterButtons();
      renderActiveFilters();
      renderArticles(results.slice(0, limit), results.length, limit);
    }

    function getSelectedValue(name) {
      const checked = document.querySelector(`input[name="${name}"]:checked`);
      return checked ? checked.value : "";
    }

    function syncFavoriteFilterButtons() {
      if (state.favoriteFilter === "お気に入り") {
        introFavoriteButton.classList.add("is-active");
      } else {
        introFavoriteButton.classList.remove("is-active");
      }
    }

    function renderActiveFilters() {
      activeFilters.innerHTML = "";

      if (state.favoriteFilter === "お気に入り") {
        const chip = document.createElement("span");
        chip.className = "active-filter-chip";
        chip.textContent = "お気に入り";

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "active-filter-remove";
        removeButton.textContent = "×";
        removeButton.addEventListener("click", () => {
          state.favoriteFilter = "";
          applySearch();
        });

        chip.appendChild(removeButton);
        activeFilters.appendChild(chip);
      }
    }

    function activateFavoriteFilter() {
      if (state.favoriteFilter === "お気に入り") {
        state.favoriteFilter = "";
      } else {
        state.favoriteFilter = "お気に入り";
        state.statusFilter = "";
        state.pendingTagFilter = "";

        publicMetaButton.classList.remove("is-active");
        nazoMetaButton.classList.remove("is-active");

        document.querySelectorAll('input[name="tag"]').forEach((radio) => {
          radio.checked = false;
          radio.dataset.wasChecked = "false";
        });
      }

      applySearch();
    }

    function renderArticles(articles, totalCount, limit) {
      articleList.innerHTML = "";

      resultCount.textContent = `${totalCount}件中 ${Math.min(totalCount, limit)}件を表示`;

      if (articles.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "条件に合う記事は見つかりませんでした。";
        articleList.appendChild(empty);
        return;
      }

      articles.forEach((article) => {
        const item = document.createElement("article");
        const isFavorite = article["ステータス2"] === "お気に入り";
        item.className = isFavorite ? "article is-favorite" : "article";

        const title = document.createElement("h3");
        title.className = "article-title";
        title.textContent = article["記事タイトル"];

        const meta = document.createElement("div");
        meta.className = "article-meta";

        const date = document.createElement("span");
        date.textContent = article["日付"];

        const tag = document.createElement("span");
        tag.className = "tag";
        tag.textContent = article["タグ"];

        meta.appendChild(date);
        meta.appendChild(tag);

        if (isFavorite) {
          const favoriteBadge = document.createElement("button");
          favoriteBadge.type = "button";
          favoriteBadge.className = state.favoriteFilter === "お気に入り" ? "favorite-badge is-active" : "favorite-badge";
          favoriteBadge.textContent = "お気に入り";
          favoriteBadge.addEventListener("click", activateFavoriteFilter);

          meta.appendChild(favoriteBadge);
        }

        const main = document.createElement("div");
        main.className = "article-main";

        const body = document.createElement("p");
        body.className = "article-body";
        body.textContent = makeExcerpt(article["本文"], 20);

        main.appendChild(body);

        item.appendChild(title);
        item.appendChild(meta);
        item.appendChild(main);

        articleList.appendChild(item);
      });
    }

    function makeExcerpt(text, maxLength) {
      if (!text) return "";

      const normalized = text.trim();

      if (normalized.length <= maxLength) {
        return normalized;
      }

      return normalized.slice(0, maxLength) + "…";
    }
  </script>
</body>
