<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>片翼【mmの謎解き#9】</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="intro-overlay" id="introOverlay">
    <section class="intro-modal" role="dialog" aria-modal="true" aria-labelledby="introTitle">
      <button type="button" class="intro-close" id="introCloseButton" aria-label="閉じる">×</button>
      <h2 class="intro-title" id="introTitle">片翼【mmの謎解き#9】</h2>
      <p class="intro-text">
        この謎解きの成功条件は、<br>
        クリアページに到達することです。<br>
        ソースコードの閲覧は禁止です。<br>
        この謎解きが、あなたの<button type="button" class="intro-hidden-filter-button" id="introFavoriteButton">お気に入り</button>の謎解きになることを願っております。
      </p>
      <p class="intro-start">右上の×を押して、始めましょう。</p>
    </section>
  </div>

  <div class="clear-overlay is-hidden" id="clearOverlay">
    <section class="clear-modal" role="dialog" aria-modal="true" aria-labelledby="clearTitle">
      <button type="button" class="clear-close" id="clearCloseButton" aria-label="閉じる">×</button>
      <h2 class="clear-title" id="clearTitle">CLEAR！</h2>
      <p class="clear-subtitle">片翼【mmの謎解き#9】</p>
      <a class="post-button" id="postButton" href="#" target="_blank" rel="noopener noreferrer">POST</a>
    </section>
  </div>

  <main class="page">
    <header>
      <div class="title-area">
        <div class="site-label">
          <button type="button" class="hidden-filter-button" id="nazoMetaButton">謎解き</button>
        </div>
        <h1>片翼【mmの謎解き#9】</h1>
        <div class="meta-info">
          <div>想定クリア時間：90min</div>
          <div>
            <button type="button" class="meta-filter-button" id="publicMetaButton">公開</button>：2026年6月17日
          </div>
          <div>制作：mm（@mm_syumida）#mmの謎解き</div>
        </div>
      </div>
    </header>

    <p class="lead">記事を検索して、クリアページに到達しよう！</p>

    <section class="card answer-panel" id="answerPanel">
      <div class="search-header">
        <h2 class="panel-title">解答フォーム</h2>
      </div>

      <form class="answer-form" id="answerForm">
        <div class="field">
          <label class="field-label" for="answerInput">解答</label>
          <input class="answer-input" id="answerInput" type="text" autocomplete="off" placeholder="解答をひらがなで入力" />
        </div>
        <button class="answer-button" type="submit">送信</button>
      </form>
      <p class="answer-message" id="answerMessage" aria-live="polite"></p>
    </section>

    <section class="card search-panel">
      <div class="search-header">
        <h2 class="panel-title">記事を検索</h2>
      </div>

      <form id="searchForm">
        <div class="search-grid">
          <div class="field">
            <span class="field-label">タグ</span>
            <div class="option-list">
              <label class="option">
                <input type="radio" name="tag" value="仕事" />
                <span>仕事</span>
              </label>
              <label class="option">
                <input type="radio" name="tag" value="恋愛" />
                <span>恋愛</span>
              </label>
              <label class="option">
                <input type="radio" name="tag" value="ゲーム" />
                <span>ゲーム</span>
              </label>
              <label class="option">
                <input type="radio" name="tag" value="ほか" />
                <span>ほか</span>
              </label>
            </div>
          </div>

          <div class="field">
            <span class="field-label">日付</span>
            <div class="option-list">
              <label class="option">
                <input type="radio" name="dateOrder" value="old" checked />
                <span>古い順</span>
              </label>
              <label class="option">
                <input type="radio" name="dateOrder" value="new" />
                <span>新しい順</span>
              </label>
            </div>
          </div>

          <div class="field">
            <span class="field-label">表示件数</span>
            <div class="option-list">
              <label class="option">
                <input type="radio" name="limit" value="5" checked />
                <span>5件</span>
              </label>
              <label class="option">
                <input type="radio" name="limit" value="10" />
                <span>10件</span>
              </label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="search-button" type="submit">検索</button>
          <button class="reset-button" type="button" id="resetButton">リセット</button>
        </div>
      </form>
    </section>

    <section class="card result-area">
      <div class="result-head">
        <div class="result-left">
          <h2 class="result-title">検索結果</h2>
          <div class="active-filters" id="activeFilters"></div>
        </div>
        <div class="result-count" id="resultCount">読み込み中...</div>
      </div>


      <div id="articleList" class="article-list"></div>
    </section>

    <footer>
      このブログ・記事はすべて架空のものです。
    </footer>
  </main>

  <script src="./script.js"></script>
</body>
</html>
